          - heading "デュアルキャリア・カップル実践編：出産・育児とイタリア移住で見えたこと" [level=1] [ref=e22]
          - paragraph [ref=e23]: 2年前の記事で整理したデュアルキャリアの意思決定を、実際に運用した結果を振り返ります。出産、イタリア移住、交代制ワンオペ育児を経て見えた現実と学びをまとめました。
          - generic [ref=e24]:
            - generic [ref=e25]: 2026-03-31
            - generic [ref=e26]: 9 min read
            - generic [ref=e27]: JA
        - group [ref=e28]:
          - generic "Table of contents" [ref=e29] [cursor=pointer]
        - heading "はじめに" [level=2] [ref=e30]
        - paragraph [ref=e31]:
          - text: 2年前に、「
          - link "『デュアルキャリア・カップル』を読んで夫婦で話したこと" [ref=e32] [cursor=pointer]:
            - /url: https://hippocampus-garden.com/dual_career_couples/
          - text: 」という記事を書きました。そこでは、本の内容を手がかりにしながら、共働き夫婦がフランス移住という転換期をどう乗り越えるか、特に価値観・限界・不安について対話したことをまとめました。手探りで書いた記事でしたが、同じ悩みを抱える人たちから反響をいただくことができました。
        - paragraph [ref=e33]: その後、私たちは「デュアルキャリア」を実践する中で、妊娠、出産、妻の国連就職、イタリア移住、初めての育児といったライフイベントを一気に経験しました。本記事では、生活が激しく変化する中で、当時の意思決定や『デュアルキャリア・カップル』の説くフレームワークがどこまで機能したのか、どこで摩擦が生じたのかについて書いてみたいと思います。
        - paragraph [ref=e34]: なお、妊娠と出産（それも異国の地で）も非常に大きな出来事でしたが、このトピックをここで詳しく扱うと主題がぶれてしまうので割愛します。
        - heading "2年間の実践で起きたこと" [level=2] [ref=e35]
        - paragraph [ref=e36]: 前提として書いておくと、妊娠前までは、私たちのデュアルキャリアは安定していました。私は仕事に集中し、妻は学業に集中しつつ、家事をやや多めに担うという分担です。もちろん細かな調整はありましたが、少なくとも「次のステージをどうするか」という切迫した議論はありませんでした。
        - paragraph [ref=e37]: 状況が変わったのは、妻の仕事探しと妊娠が重なってからです。国際機関を志望する妻の就職活動は一筋縄ではいきません。応募先ごとに勤務地が異なり、例えばOECDならパリ、ILOならジュネーブ、世界銀行ならワシントンD.C.といった具合です。したがって、妻が働きたい機関がある都市と、私が仕事を見つけられる都市の共通集合を探し、その中で優先順位をつけて応募していく必要がありました。大人二人だけならまだ話は比較的単純です。しかし、その時期に妊娠が重なったことで、「その都市で子育てができそうか」という別の条件も加わりました。
        - paragraph [ref=e38]: 妻がローマの国際機関から内定をもらった後は、4ヶ月くらいの間に下記のイベントが連続しました。
        - list [ref=e39]:
          - listitem [ref=e40]:
            - text: パリで出産、妻が育児を担当
            - superscript [ref=e41]:
              - link "1" [ref=e42] [cursor=pointer]:
                - /url: "#user-content-fn-1"
          - listitem [ref=e43]: 私がローマからリモートで現職を続けられるように手配、妻がビザ取得などの移動準備
          - listitem [ref=e44]: ローマへ引っ越し、妻が勤務開始
          - listitem [ref=e45]: 私が育休を取って、育児の主担当を交代
          - listitem [ref=e46]: 子供が保育園に入園
          - listitem [ref=e47]: 今後は私が職場復帰し、リモートで働く予定である
        - paragraph [ref=e48]: 振り返ってみると、事前に整理していた考え方が機能した場面もあれば、誤算もありました。以下、両者についてそれぞれ述べます。
        - heading "うまくいったこと" [level=2] [ref=e49]
        - paragraph [ref=e50]: 最初に、うまく機能したことから書きます。
        - paragraph [ref=e51]:
          - strong [ref=e52]: キャリアをゼロサムで捉えなかったこと。
          - text: 妻のローマでの仕事は、貴重なキャリア機会でした。妻が毎日忙しいながらも仕事にワクワクしている様子を見ると、「大変だったけどローマに来てよかったな」としみじみ感じます。一方で、ローマという場所はソフトウェアエンジニアにとって最高の都市ではありません。パリと比べると、求人の数も給与水準も圧倒的に劣ります。そういうわけで両者のキャリア機会には明確なトレードオフが存在していましたが、諦めずに私がリモートワークで現職を続けられるオプションを模索することで、両者とも納得できる結論に至ることができました。この議論に際しては、前回の記事で書いた「価値観・限界・不安」のフレームワークやポジティブサムの思考が役に立ちました。時間のある時に『デュアルキャリア・カップル』を輪読しておいてよかったです。
        - paragraph [ref=e53]:
          - strong [ref=e54]: 出産というイベントを二人で経験したこと。
          - text: 日本には里帰り出産という文化があるため、「日本に帰って出産しないの？」と聞かれることがしばしばありました。しかし、私たちにとってそれは現実的な選択肢ではありませんでした。第一に、妊娠後期にパリから東京まで移動すること自体が大きな負担とリスクを伴います。第二に、私が出産とその後の育児の立ち上がりに立ち会えないと、子育てに関する知識とスキルのギャップが決定的に開いてしまうと感じていました。
          - superscript [ref=e55]:
            - link "2" [ref=e56] [cursor=pointer]:
              - /url: "#user-content-fn-2"
          - text: そのため、フランスの医療制度への信頼感も踏まえ、パリで一緒に出産を経験するのが私たちにとって自然な選択でした。妊娠・出産・子育てについては、その場で一緒に経験しないと解像度高く共有できないことが多いです。この重要な時期を二人でくぐり抜けたことは、その後の育児や意思決定の土台になりました。日本では産後入院にパートナーが同伴するケースはまだ珍しいようですが、個人的にはかなりおすすめできます。
        - paragraph [ref=e57]:
          - strong [ref=e58]: 育児の主担当を途中で交代したこと。
          - text: 出産と育児の初期に役割が非対称になること自体は避けにくく、実際に妻側の負担は重くなりました。その状態を固定せず、後で私が育休を取って主担当を交代する前提で考えていたことは良い判断でした。実際に家庭側へ回ってみて強く感じたのは、夫婦の間の認識のギャップが縮まったことです。育児の何がしんどいのか、どういう支援があると助かるのかは、頭で理解するのと一人称で経験するのとでは解像度がまるで違いました。ワンオペに近い状態では、どうしても片方にしか見えていない現実が増えます。例えば、以前の私は、妻がその日に撮った子どもの写真を見せながら話しかけてきても、仕事で頭がいっぱいで生返事をしてしまうことがありました。しかし逆の立場を経験すると、その反応がどれほど寂しいものかがよくわかります。一度両方の立場を経験すると情報格差が減り、相互理解や協力の質が改善しました。こういった経験を通じて、私たちにとってのフェアネスとは、完全に分業することでも常に半々であることでもなく、「長い時間軸で見て役割を交代可能にしておくこと」なのだと感じるようになりました。
          - superscript [ref=e59]:
            - link "3" [ref=e60] [cursor=pointer]:
              - /url: "#user-content-fn-3"
        - paragraph:
          - img "ローマの景色"
        - generic [ref=e61]: 慣らし保育が始まってから、少し観光をする余裕が出てきました。これから街のことを知っていくにつれ、この景色もより味わい深いものになっていくことでしょう。
        - heading "学び" [level=2] [ref=e62]
        - paragraph [ref=e63]: 一方で、実際にやってみて初めてわかったことも多くありました。
        - paragraph [ref=e64]:
          - strong [ref=e65]: 子どもが生まれると、デュアルキャリアは二人の問題ではなくなること。
          - text: 前回の記事を書いた時点では、基本的には二人の利害調整の問題として考えていました。しかし、子どもが生まれると、そこに第三の主体として子どもの都合が入ってきます。世話にかかる時間的制約だけでなく、保育園探し、病院へのアクセス、年齢が上がれば教育環境や子供本人の意思といった条件も無視できません。大人二人だけなら気合いで乗り切れていたことが、同じようにはできなくなります。数年後にはまた妻の仕事で他の国に移り住む可能性が高いですが、次回の引っ越しはさらにハードになるでしょう。
        - paragraph [ref=e66]:
          - strong [ref=e67]: 育児の負担を過小評価していたこと。
          - text: 上述の交代制ワンオペは、妻が出産後なるべく早く仕事に復帰できるようにするために考えた策でした。大変になること自体は事前にわかっていましたし、双方の親に来てもらうなど要所ごとに助けてもらいもしましたが、実際の苦労は想像以上でした。妻の担当期間は、子どものパスポート取得、ビザ申請、保育園探しと重なっていました。子どもを抱えながら片手で昼食を取らなければならないような日々の中で、そうした複雑な手続きを並行して進めていたわけで、相当な負荷だったと推察します。一方、私の担当期間では、慣れない育児に加えてローマでの家探しや引っ越し作業などのタスクがありました（しかもイタリア語は全くわからない）。
          - superscript [ref=e68]:
            - link "4" [ref=e69] [cursor=pointer]:
              - /url: "#user-content-fn-4"
          - text: 肉体的にも精神的にもストレスフルで、誰か一人が体調を崩せば計画が破綻するような、ぎりぎりの状態が数週間続いてしまいました。
        - paragraph [ref=e70]: こうした問題は、結局のところ「余裕を持つ」以外の解決策を見つけにくいのがつらいところです。一つ言えるのは、海外で共働きをしながら子育てもするという、一見すると輝かしい生活であっても、実際には泥臭い努力の積み重ねの上に成り立っているということです。
        - heading "実践を踏まえた、私たちなりの理解" [level=2] [ref=e71]
        - paragraph [ref=e72]: 今回の経験を経て、私たちの中でデュアルキャリアに対する解像度が上がりました。前回の記事を書いた2年前は、オープンな対話を通じて両者が納得できるキャリア設計をするという理念を頭で理解していたに過ぎませんでした。
        - paragraph [ref=e73]: 今は、もっと運用に近いものとして見ています。最初に方針を決めたら終わりではなく、二人の価値観や関係性、そしてそれを取り巻く環境が変わるたびに調整し続けるものだという感覚です。具体的な例を挙げると、二人ともが同時にキャリアを前進させようとするのは、必ずしも現実的でないという考えに至りました。実際には、大きな機会が来るタイミングも、家庭側に重心を置く必要がある時期もずれることが多いです。したがって、そのずれの発生は前提として、「今はどちらかのキャリアを優先するけれど、後でまた組み替える」という運用の方が今の私たちにはしっくりきています。
        - heading "おわりに" [level=2] [ref=e74]
        - paragraph [ref=e75]: 子どもが生まれたこと、そして妻が国連という不安定さを含むキャリアを選んだことによって、パズルの難易度はまた一段上がりました。今後は数年ごとに住む国が変わり、そのたびに仕事をどうするかを考えるような、動的な調整を余儀なくされるはずです。もちろん、これは大変なことです。
        - paragraph [ref=e76]: しかし、そのたびに現状維持で済ませず、キャリアと生活を意識的に見直さざるを得ないという意味では、ある種の健全さもあります。予測不可能な要素が多い分、人生が固定化しすぎない面白さがあるとも感じます。妻の職場には、実際にこうしたキャリアを歩んできた人がいて、デュアルキャリアのロールモデルとして参考になるのも心強い点です。私たちもそうした先人たちを見ながら、体当たりでやっていくしかないのだと思います。
        - paragraph [ref=e77]: 本記事を読んで共感された方、あるいは似たような経験をされた方がいれば、ぜひコメントなどで教えてください。こういう話は身近では意外と聞けないので、私も他の方の経験を知りたいと思っています。
        - generic [ref=e78]:
