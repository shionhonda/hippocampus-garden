              - paragraph [ref=e89]:
                - text: もっとも、生後すぐの3ヶ月弱を担当した妻と、その後の2ヶ月弱（慣らし保育含む）を担当した私とでは、負荷には大きな差がありました。私が担当する頃には授乳やおむつ替えの頻度が減り、あやすと笑ってくれるようにもなっていたので、やりがいを感じやすかったのも事実です。私の担当期間で特に大変だったのは哺乳瓶拒否でしたが、これについてはまた別の記事で書こうと思います。
