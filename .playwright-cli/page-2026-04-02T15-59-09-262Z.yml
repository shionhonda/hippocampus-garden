                - text: ChatGPTには、メッセージの翻訳など小さなことから、引っ越し業者選定など大きなことまで、本当にあらゆることでお世話になりました。一通りの困難を乗り越えたことで、やる気とお金とAIさえあればどんなことでもできるというある種の万能感を得ました。逆に、AI以前の人類はどうやって海外移住をしていたのか、全く想像がつきません…
